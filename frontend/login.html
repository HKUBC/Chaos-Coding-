<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In – Food Delivery App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #e63946;
      --red-dark: #c1121f;
      --text: #1a1a2e;
      --muted: #6b7280;
      --border: #e5e7eb;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #e63946 0%, #c1121f 45%, #1a1a2e 100%);
    }

    /* ── Brand bar at top ── */
    .brand-bar {
      padding: 22px 40px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: white;
    }

    .brand-bar span { font-size: 1.8rem; }
    .brand-bar h1   { font-size: 1.4rem; letter-spacing: -0.02em; flex: 1; }

    .home-btn {
      color: white;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(255,255,255,0.4);
      padding: 7px 18px;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .home-btn:hover { background: rgba(255,255,255,0.28); }

    /* ── Page center ── */
    .page-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 20px 60px;
    }

    /* ── Card ── */
    .card {
      background: white;
      border-radius: 20px;
      padding: 44px 44px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.25);
    }

    .card-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: #fff5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.7rem;
      margin-bottom: 20px;
    }

    .card h2 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }

    .card .subtitle {
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* ── Form ── */
    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap .input-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
    }

    input {
      width: 100%;
      padding: 11px 14px 11px 38px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      color: var(--text);
      background: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(230,57,70,0.12);
      background: #fff;
    }

    /* ── Button ── */
    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #e63946, #c1121f);
      color: white;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    .btn:hover   { opacity: 0.92; }
    .btn:active  { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Alert ── */
    .alert {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.86rem;
      font-weight: 500;
      margin-bottom: 16px;
      display: none;
    }

    .alert.error {
      background: #fff0f1;
      border: 1px solid #fca5a5;
      color: #991b1b;
    }

    .alert.success {
      background: #f0fdf4;
      border: 1px solid #86efac;
      color: #166534;
    }

    /* ── Footer links ── */
    .link-row {
      text-align: center;
      margin-top: 22px;
      font-size: 0.86rem;
      color: var(--muted);
    }

    .link-row a {
      color: var(--red);
      text-decoration: none;
      font-weight: 600;
    }
    .link-row a:hover { text-decoration: underline; }

    /* ── Test credentials hint ── */
    .hint-box {
      margin-top: 20px;
      padding: 12px 16px;
      background: #f9fafb;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .hint-box strong { color: #374151; }
  </style>
</head>
<body>

  <div class="brand-bar">
    <span>🍔</span>
    <h1>Food Delivery App</h1>
    <a class="home-btn" href="/frontend/index.html">🏠 Home</a>
  </div>

  <div class="page-center">
    <div class="card">
      <div class="card-icon">👋</div>
      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to continue to your account</p>

      <div class="alert" id="alert"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="user_id">Username</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="user_id" placeholder="Enter your username" autocomplete="username" required />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required />
          </div>
        </div>

        <button type="submit" class="btn" id="login-btn">Sign In</button>
      </form>

      <div class="link-row">
        Don't have an account? <a href="/frontend/signup.html">Sign up</a>
      </div>

      <div class="hint-box">
        <strong>Test owner account:</strong><br />
        Username: <strong>owner1</strong> &nbsp;·&nbsp; Password: <strong>password123</strong>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:8000';

    function showAlert(message, type) {
      const el = document.getElementById('alert');
      el.textContent = message;
      el.className = `alert ${type}`;
      el.style.display = 'block';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const user_id  = document.getElementById('user_id').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('login-btn');

      if (!user_id || !password) {
        showAlert('Please fill in all fields.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id, password })
        });

        const data = await res.json();

        if (!res.ok) {
          showAlert(data.detail || 'Login failed. Please try again.', 'error');
          return;
        }

        // Store token and redirect based on role
        localStorage.setItem('token', data.token);
        localStorage.setItem('user_id', user_id);
        localStorage.setItem('role', data.role);
        if (data.restaurant_id != null) {
          localStorage.setItem('restaurant_id', data.restaurant_id);
        }

        const destinations = {
          'customer':          '/frontend/index.html',
          'driver':            '/frontend/driver-dashboard.html',
          'restaurant_owner':  '/frontend/dashboard.html',
        };

        const redirect = destinations[data.role] || '/frontend/index.html';
        showAlert(`Login successful! Redirecting…`, 'success');
        setTimeout(() => { window.location.href = redirect; }, 800);

      } catch (err) {
        showAlert('Could not connect to the server.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>

</body>
</html>
