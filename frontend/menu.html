<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurant Menu</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f5f5f5;
      color: #333;
    }

    header {
      background-color: #e63946;
      color: white;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 8px;
      transition: background 0.15s;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.35);
    }

    header h1 {
      font-size: 1.6rem;
    }

    .restaurant-info {
      background: white;
      border-bottom: 1px solid #eee;
      padding: 20px 40px;
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: #555;
    }

    .info-item span.icon {
      font-size: 1.1rem;
    }

    .info-item strong {
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .filters input {
      flex: 1;
      min-width: 160px;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .filters input:focus {
      border-color: #e63946;
    }

    .filters button {
      padding: 10px 20px;
      background: #e63946;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .filters button:hover {
      background: #c1121f;
    }

    .filters button.clear {
      background: #eee;
      color: #555;
    }

    .filters button.clear:hover {
      background: #ddd;
    }

    .section-title {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: #222;
    }

    .menu-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .menu-item {
      background: white;
      border-radius: 12px;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    .menu-item-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .menu-item-icon {
      font-size: 1.8rem;
    }

    .menu-item-name {
      font-size: 1rem;
      font-weight: 600;
    }

    .menu-item-cuisine {
      font-size: 0.82rem;
      color: #888;
      margin-top: 2px;
    }

    .menu-item-price {
      font-size: 1.1rem;
      font-weight: 700;
      color: #e63946;
    }

    .status {
      text-align: center;
      padding: 60px 20px;
      font-size: 1rem;
      color: #888;
    }

    .status.error {
      color: #e63946;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid #eee;
      border-top-color: #e63946;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <header>
    <button class="back-btn" onclick="window.location.href='/'">&#8592;</button>
    <span>🍽️</span>
    <h1 id="header-title">Restaurant Menu</h1>
  </header>

  <div class="restaurant-info" id="restaurant-info" style="display:none;">
    <div class="info-item">
      <span class="icon">🍴</span>
      <div><div style="font-size:0.75rem;color:#aaa;">Cuisine</div><strong id="info-cuisine">—</strong></div>
    </div>
    <div class="info-item">
      <span class="icon">📍</span>
      <div><div style="font-size:0.75rem;color:#aaa;">Location</div><strong id="info-location">—</strong></div>
    </div>
    <div class="info-item">
      <span class="icon">🚚</span>
      <div><div style="font-size:0.75rem;color:#aaa;">Delivery Method</div><strong id="info-delivery">—</strong></div>
    </div>
  </div>

  <div class="container">

    <div class="filters">
      <input type="text" id="filter-name" placeholder="Search by food name..." />
      <input type="text" id="filter-cuisine" placeholder="Filter by cuisine..." />
      <input type="number" id="filter-min" placeholder="Min price ($)" min="0" />
      <input type="number" id="filter-max" placeholder="Max price ($)" min="0" />
      <button onclick="applyFilters()">Search</button>
      <button class="clear" onclick="clearFilters()">Clear</button>
    </div>

    <p class="section-title" id="section-title">Menu Items</p>

    <div id="status" class="status">
      <div class="spinner"></div>
      Loading menu...
    </div>

    <div class="menu-list" id="menu-list"></div>
  </div>

  <script>
    const API_BASE = 'http://localhost:8000';

    const params = new URLSearchParams(window.location.search);
    const restaurantId = params.get('id');

    if (!restaurantId) window.location.href = '/';

    const foodIcons = ['🍕', '🍔', '🌮', '🍜', '🍱', '🥗', '🍣', '🥘', '🌯', '🍛'];
    function iconForItem(name) {
      const n = name.toLowerCase();
      if (n.includes('pizza')) return '🍕';
      if (n.includes('burger')) return '🍔';
      if (n.includes('taco') || n.includes('burrito')) return '🌮';
      if (n.includes('sushi')) return '🍣';
      if (n.includes('pasta') || n.includes('noodle')) return '🍜';
      if (n.includes('salad')) return '🥗';
      if (n.includes('rice') || n.includes('briyani')) return '🍚';
      if (n.includes('cake') || n.includes('dessert')) return '🍰';
      if (n.includes('soup')) return '🍲';
      return foodIcons[Math.floor(Math.random() * foodIcons.length)];
    }

    function renderItems(items) {
      const menuEl = document.getElementById('menu-list');
      const sectionTitle = document.getElementById('section-title');
      const statusEl = document.getElementById('status');

      menuEl.innerHTML = '';
      statusEl.style.display = 'none';
      sectionTitle.textContent = `Menu Items (${items.length})`;

      if (items.length === 0) {
        statusEl.textContent = 'No items match your search.';
        statusEl.className = 'status';
        statusEl.style.display = 'block';
        return;
      }

      items.forEach(item => {
        const row = document.createElement('div');
        row.className = 'menu-item';
        row.innerHTML = `
          <div class="menu-item-left">
            <span class="menu-item-icon">${iconForItem(item.food_item)}</span>
            <div>
              <div class="menu-item-name">${item.food_item}</div>
              <div class="menu-item-cuisine">${item.preferred_cuisine}</div>
            </div>
          </div>
          <div class="menu-item-price">$${parseFloat(item.order_value).toFixed(2)}</div>
        `;
        menuEl.appendChild(row);
      });
    }

    async function loadMenu() {
      const statusEl = document.getElementById('status');
      const headerTitle = document.getElementById('header-title');
      const infoEl = document.getElementById('restaurant-info');

      headerTitle.textContent = `Restaurant #${restaurantId}`;
      document.title = `Restaurant #${restaurantId} — Menu`;

      try {
        const res = await fetch(`${API_BASE}/restaurants/${restaurantId}/profile`);
        if (!res.ok) throw new Error(`Server returned ${res.status}`);

        const data = await res.json();

        // Show restaurant info bar
        const r = data.restaurant;
        if (r) {
          document.getElementById('info-cuisine').textContent = r.preferred_cuisine || '—';
          document.getElementById('info-location').textContent = r.location || '—';
          document.getElementById('info-delivery').textContent = r.delivery_method || '—';
          infoEl.style.display = 'flex';
        }

        renderItems(data.menu);

      } catch (err) {
        statusEl.innerHTML = `<p>Failed to load menu.<br><small>${err.message}</small></p>`;
        statusEl.className = 'status error';
      }
    }

    async function applyFilters() {
      const statusEl = document.getElementById('status');
      const menuEl = document.getElementById('menu-list');

      const name = document.getElementById('filter-name').value.trim();
      const cuisine = document.getElementById('filter-cuisine').value.trim();
      const minPrice = document.getElementById('filter-min').value;
      const maxPrice = document.getElementById('filter-max').value;

      const query = new URLSearchParams();
      if (name) query.set('food_item', name);
      if (cuisine) query.set('cuisine', cuisine);
      if (minPrice) query.set('min_price', minPrice);
      if (maxPrice) query.set('max_price', maxPrice);

      menuEl.innerHTML = '';
      statusEl.innerHTML = '<div class="spinner"></div>Searching...';
      statusEl.className = 'status';
      statusEl.style.display = 'block';

      try {
        const res = await fetch(`${API_BASE}/restaurants/${restaurantId}/items/filter?${query}`);
        if (!res.ok) throw new Error(`Server returned ${res.status}`);
        const items = await res.json();
        renderItems(items);
      } catch (err) {
        statusEl.innerHTML = `<p>Search failed.<br><small>${err.message}</small></p>`;
        statusEl.className = 'status error';
      }
    }

    function clearFilters() {
      document.getElementById('filter-name').value = '';
      document.getElementById('filter-cuisine').value = '';
      document.getElementById('filter-min').value = '';
      document.getElementById('filter-max').value = '';
      loadMenu();
    }

    // Allow pressing Enter in any filter input to trigger search
    document.querySelectorAll('.filters input').forEach(input => {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') applyFilters();
      });
    });

    loadMenu();
  </script>

</body>
</html>
