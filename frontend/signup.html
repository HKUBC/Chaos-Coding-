<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – Food Delivery App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background-color: #e63946;
      color: white;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 1.8rem; }
    header span { font-size: 2rem; }

    .header-right { margin-left: auto; }

    .home-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      padding: 8px 14px;
      border-radius: 8px;
      transition: background 0.15s;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .home-btn:hover { background: rgba(255,255,255,0.35); }

    .page-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 40px 44px;
      width: 100%;
      max-width: 540px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #222;
      margin-bottom: 6px;
    }

    .card .subtitle {
      font-size: 0.88rem;
      color: #888;
      margin-bottom: 28px;
    }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #333;
      background: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #e63946;
      box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.12);
      background: #fff;
    }

    /* Role selector */
    .role-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .role-option input[type="radio"] { display: none; }

    .role-option label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 14px 8px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      color: #888;
      text-align: center;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      user-select: none;
    }

    .role-option label .role-icon { font-size: 1.6rem; }

    .role-option input[type="radio"]:checked + label {
      border-color: #e63946;
      color: #e63946;
      background: #fff0f1;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      background-color: #e63946;
      color: white;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:hover { background-color: #c1121f; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background-color: #f4a0a7; cursor: not-allowed; }

    .alert {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 500;
      margin-bottom: 18px;
      display: none;
    }

    .alert.error {
      background: #fff0f1;
      border: 1px solid #f4a0a7;
      color: #c1121f;
    }

    .alert.success {
      background: #f0fff4;
      border: 1px solid #9ae6b4;
      color: #276749;
    }

    .link-row {
      text-align: center;
      margin-top: 20px;
      font-size: 0.88rem;
      color: #888;
    }

    .link-row a {
      color: #e63946;
      text-decoration: none;
      font-weight: 600;
    }

    .link-row a:hover { text-decoration: underline; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .section-label {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #bbb;
      margin: 20px 0 12px;
      border-top: 1px solid #f0f0f0;
      padding-top: 16px;
    }

    .role-section { display: none; }
    .role-section.visible { display: block; }
  </style>
</head>
<body>

  <header>
    <span>🍔</span>
    <h1>Food Delivery App</h1>
    <div class="header-right">
      <a class="home-btn" href="/frontend/index.html">🏠 Home</a>
    </div>
  </header>

  <div class="page-center">
    <div class="card">
      <h2>Create an account</h2>
      <p class="subtitle">Choose your role and get started</p>

      <div class="alert" id="alert"></div>

      <form id="signup-form" novalidate>

        <div class="form-group">
          <label>I am a…</label>
          <div class="role-grid">
            <div class="role-option">
              <input type="radio" name="role" id="role-customer" value="customer" checked />
              <label for="role-customer">
                <span class="role-icon">🛒</span>
                Customer
              </label>
            </div>
            <div class="role-option">
              <input type="radio" name="role" id="role-owner" value="restaurant_owner" />
              <label for="role-owner">
                <span class="role-icon">🍽️</span>
                Restaurant Owner
              </label>
            </div>
            <div class="role-option">
              <input type="radio" name="role" id="role-driver" value="driver" />
              <label for="role-driver">
                <span class="role-icon">🚗</span>
                Driver
              </label>
            </div>
          </div>
        </div>

        <!-- Personal info -->
        <div class="section-label">Personal Information</div>

        <div class="form-group">
          <label for="full_name">Full Name</label>
          <input type="text" id="full_name" placeholder="Jane Smith" autocomplete="name" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="jane@example.com" autocomplete="email" required />
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="+1 (555) 000-0000" autocomplete="tel" required />
          </div>
        </div>

        <!-- Account credentials -->
        <div class="section-label">Account Credentials</div>

        <div class="form-group">
          <label for="user_id">Username</label>
          <input type="text" id="user_id" placeholder="Choose a username" autocomplete="username" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Choose a password" autocomplete="new-password" required />
          </div>
          <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" placeholder="Re-enter password" autocomplete="new-password" required />
          </div>
        </div>

        <!-- Restaurant owner extras -->
        <div class="role-section" id="section-owner">
          <div class="section-label">Restaurant Details</div>
          <div class="form-group">
            <label for="restaurant_name">Restaurant Name</label>
            <input type="text" id="restaurant_name" placeholder="e.g. Mario's Pizzeria" />
          </div>
          <div class="form-group">
            <label for="restaurant_id">Restaurant ID <span style="font-weight:400;color:#aaa;">(numeric)</span></label>
            <input type="number" id="restaurant_id" placeholder="e.g. 1042" min="1" />
          </div>
        </div>

        <!-- Driver extras -->
        <div class="role-section" id="section-driver">
          <div class="section-label">Vehicle Details</div>
          <div class="form-row">
            <div class="form-group">
              <label for="vehicle">Vehicle Type</label>
              <input type="text" id="vehicle" placeholder="e.g. Toyota Corolla" />
            </div>
            <div class="form-group">
              <label for="license_plate">License Plate</label>
              <input type="text" id="license_plate" placeholder="e.g. ABC-1234" />
            </div>
          </div>
        </div>

        <button type="submit" class="btn" id="signup-btn">Create Account</button>
      </form>

      <div class="link-row">
        Already have an account? <a href="/frontend/login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:8000';

    function showAlert(message, type) {
      const el = document.getElementById('alert');
      el.textContent = message;
      el.className = `alert ${type}`;
      el.style.display = 'block';
    }

    // Show/hide role-specific sections when role changes
    function updateRoleSections() {
      const role = document.querySelector('input[name="role"]:checked').value;
      document.getElementById('section-owner').classList.toggle('visible', role === 'restaurant_owner');
      document.getElementById('section-driver').classList.toggle('visible', role === 'driver');
    }

    document.querySelectorAll('input[name="role"]').forEach(r => {
      r.addEventListener('change', updateRoleSections);
    });

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const full_name        = document.getElementById('full_name').value.trim();
      const email            = document.getElementById('email').value.trim();
      const phone            = document.getElementById('phone').value.trim();
      const user_id          = document.getElementById('user_id').value.trim();
      const password         = document.getElementById('password').value;
      const confirm_password = document.getElementById('confirm_password').value;
      const role             = document.querySelector('input[name="role"]:checked').value;
      const btn              = document.getElementById('signup-btn');

      if (!full_name || !email || !phone || !user_id || !password || !confirm_password) {
        showAlert('Please fill in all required fields.', 'error');
        return;
      }

      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showAlert('Please enter a valid email address.', 'error');
        return;
      }

      if (password !== confirm_password) {
        showAlert('Passwords do not match.', 'error');
        return;
      }

      const payload = { user_id, password, role, full_name, email, phone };

      if (role === 'restaurant_owner') {
        const rid = document.getElementById('restaurant_id').value.trim();
        const rname = document.getElementById('restaurant_name').value.trim();
        if (rid) payload.restaurant_id = parseInt(rid, 10);
        if (rname) payload.restaurant_name = rname;
      }

      if (role === 'driver') {
        const vehicle = document.getElementById('vehicle').value.trim();
        const plate   = document.getElementById('license_plate').value.trim();
        if (vehicle) payload.vehicle = vehicle;
        if (plate)   payload.license_plate = plate;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account…';

      try {
        const res = await fetch(`${API_BASE}/auth/signup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
          const msg = data.detail || 'Sign up failed. Please try again.';
          showAlert(msg, 'error');
          if (msg.toLowerCase().includes('taken') || msg.toLowerCase().includes('already')) {
            const input = document.getElementById('user_id');
            input.style.borderColor = '#e63946';
            input.focus();
            input.select();
            input.addEventListener('input', () => { input.style.borderColor = ''; }, { once: true });
          }
          return;
        }

        showAlert('Account created! Redirecting to login…', 'success');
        setTimeout(() => { window.location.href = '/frontend/login.html'; }, 1000);

      } catch (err) {
        showAlert('Could not connect to the server.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>

</body>
</html>
