<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Delivery App</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f5f5f5;
      color: #333;
    }

    header {
      background-color: #e63946;
      color: white;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 1.8rem;
    }

    header span {
      font-size: 2rem;
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .section-title {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 24px;
      color: #222;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 24px 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
    }

    .card-icon {
      font-size: 2.4rem;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: #e63946;
    }

    .card-subtitle {
      font-size: 0.82rem;
      color: #888;
      margin-top: 4px;
    }

    .status {
      text-align: center;
      padding: 60px 20px;
      font-size: 1rem;
      color: #888;
    }

    .status.error {
      color: #e63946;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid #eee;
      border-top-color: #e63946;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .count-badge {
      display: inline-block;
      background: #e63946;
      color: white;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 999px;
      margin-left: 10px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

  <header>
    <span>🍔</span>
    <h1>Food Delivery App</h1>
  </header>

  <div class="container">
    <p class="section-title">
      All Restaurants
      <span class="count-badge" id="count" style="display:none;"></span>
    </p>

    <div id="status" class="status">
      <div class="spinner"></div>
      Loading restaurants...
    </div>

    <div class="grid" id="restaurant-grid"></div>
  </div>

  <script>
    const API_BASE = 'http://localhost:8000';

    async function loadRestaurants() {
      const statusEl = document.getElementById('status');
      const gridEl = document.getElementById('restaurant-grid');
      const countEl = document.getElementById('count');

      try {
        const res = await fetch(`${API_BASE}/restaurants/all_restaurants`);

        if (!res.ok) throw new Error(`Server returned ${res.status}`);

        const ids = await res.json();

        statusEl.style.display = 'none';
        countEl.textContent = ids.length;
        countEl.style.display = 'inline-block';

        ids.forEach(id => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <div class="card-icon">🍽️</div>
            <div class="card-title">Restaurant #${id}</div>
            <div class="card-subtitle">ID: ${id}</div>
          `;
          gridEl.appendChild(card);
        });

      } catch (err) {
        statusEl.innerHTML = `<p class="error">Failed to load restaurants.<br><small>${err.message}</small></p>`;
        statusEl.className = 'status error';
      }
    }

    loadRestaurants();
  </script>

</body>
</html>
