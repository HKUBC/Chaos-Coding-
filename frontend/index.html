<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Delivery App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #e63946;
      --red-dark: #c1121f;
      --bg: #f0f2f5;
      --card: #fff;
      --text: #1a1a2e;
      --muted: #6b7280;
      --border: #e5e7eb;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #e63946 0%, #c1121f 100%);
      color: white;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 12px rgba(230,57,70,0.35);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    header h1 { font-size: 1.6rem; letter-spacing: -0.02em; }
    header span.logo { font-size: 2rem; }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg, #e63946 0%, #c1121f 100%);
      color: white;
      padding: 48px 40px 64px;
      text-align: center;
    }

    header > span {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 1rem;
      opacity: 0.85;
      max-width: 460px;
      margin: 0 auto;
    }

    /* ── Container ── */
    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .cart-btn {
      position: relative;
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 1.4rem;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 8px;
      transition: background 0.15s;
      text-decoration: none;
      display: flex;
      align-items: center;
    }

    .cart-btn:hover { background: rgba(255,255,255,0.35); }

    .cart-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      background: white;
      color: #e63946;
      font-size: 0.65rem;
      font-weight: 700;
      border-radius: 999px;
      min-width: 16px;
      height: 16px;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }

    .container {
      max-width: 1100px;
      margin: -28px auto 48px;
      padding: 0 24px;
      position: relative;
    }

    /* ── Search bar ── */
    .search-bar {
      background: white;
      border-radius: 14px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      margin-bottom: 32px;
    }

    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 0.95rem;
      color: var(--text);
      background: transparent;
    }

    .search-bar input::placeholder { color: var(--muted); }

    /* ── Section Title ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }

    .count-badge {
      background: var(--red);
      color: white;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 28px 20px 24px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s;
      border: 1.5px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--red), #ff6b6b);
      transform: scaleX(0);
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      border-color: #fde8e8;
    }

    .card:hover::before { transform: scaleX(1); }

    .card-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: #fff5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin: 0 auto 14px;
    }

    .card-title {
      font-size: 0.97rem;
      font-weight: 700;
      color: var(--text);
    }

    .card-subtitle {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Status ── */
    .status {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .status.error { color: var(--red); }

    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid var(--border);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header>
    <div class="header-brand">
      <span class="logo">🍔</span>
      <h1>Food Delivery App</h1>
    </div>
    <div class="header-actions" id="header-actions"></div>
    <div class="header-right">
      <a class="cart-btn" href="/frontend/cart.html" title="View Cart">
        🛒
        <span class="cart-badge" id="cart-badge"></span>
      </a>
    </div>
  </header>

  <div class="hero">
    <h2>Order from your favourite spots</h2>
    <p>Browse local restaurants and get food delivered fast.</p>
  </div>

  <div class="container">
    <div class="search-bar">
      <span>🔍</span>
      <input type="text" id="search-input" placeholder="Search restaurants…" />
    </div>

    <div class="section-header">
      <span class="section-title">All Restaurants</span>
      <span class="count-badge" id="count" style="display:none;"></span>
    </div>

    <div id="status" class="status">
      <div class="spinner"></div>
      Loading restaurants…
    </div>

    <div class="grid" id="restaurant-grid"></div>
  </div>

  <script>
    const API_BASE = 'http://localhost:8000';
    let allIds = [];

    // ── Header auth state ─────────────────────────────────────────────────
    const actionsEl = document.getElementById('header-actions');
    const token  = localStorage.getItem('token');
    const userId = localStorage.getItem('user_id');
    const role   = localStorage.getItem('role');

    if (token) {
      actionsEl.innerHTML = `
        <span style="color:white;font-size:0.85rem;opacity:0.9;background:rgba(255,255,255,0.18);padding:6px 14px;border-radius:20px;">👤 ${userId}</span>
        <button onclick="handleLogout()" style="background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.4);color:white;font-size:0.85rem;font-weight:600;cursor:pointer;padding:7px 18px;border-radius:8px;">Sign Out</button>
      `;
    } else {
      actionsEl.innerHTML = `
        <a href="/frontend/login.html" style="color:white;font-size:0.85rem;font-weight:600;text-decoration:none;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.4);padding:7px 18px;border-radius:8px;">Sign In</a>
      `;
    }

    async function handleLogout() {
      const t = localStorage.getItem('token');
      try {
        await fetch(`${API_BASE}/auth/logout`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: t })
        });
      } finally {
        localStorage.clear();
        window.location.reload();
      }
    }

    // ── Cart badge ────────────────────────────────────────────────────────
    async function loadCartBadge() {
      if (!userId) return;
      try {
        const res = await fetch(`${API_BASE}/cart/${userId}`);
        const cart = await res.json();
        const count = (cart.items || []).reduce((sum, i) => sum + i.quantity, 0);
        const badge = document.getElementById('cart-badge');
        if (count > 0) {
          badge.textContent = count;
          badge.style.display = 'flex';
        }
      } catch (_) {}
    }

    // ── Restaurants ───────────────────────────────────────────────────────
    function renderCards(ids) {
      const gridEl  = document.getElementById('restaurant-grid');
      const countEl = document.getElementById('count');
      gridEl.innerHTML = '';
      countEl.textContent = ids.length;
      countEl.style.display = ids.length > 0 ? 'inline-block' : 'none';

      const cuisineIcons = ['🍕','🍔','🌮','🍜','🍣','🥗','🥘','🍛','🌯','🍱'];
      ids.forEach((id, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-icon">${cuisineIcons[i % cuisineIcons.length]}</div>
          <div class="card-title">Restaurant #${id}</div>
          <div class="card-subtitle">Tap to view menu</div>
        `;
        card.addEventListener('click', () => {
          window.location.href = `/frontend/menu.html?id=${id}`;
        });
        gridEl.appendChild(card);
      });
    }

    async function loadRestaurants() {
      const statusEl = document.getElementById('status');
      try {
        const res = await fetch(`${API_BASE}/restaurants/all_restaurants`);
        if (!res.ok) throw new Error(`Server returned ${res.status}`);
        allIds = await res.json();
        statusEl.style.display = 'none';
        renderCards(allIds);
      } catch (err) {
        statusEl.innerHTML = `<p>Failed to load restaurants.<br><small>${err.message}</small></p>`;
        statusEl.className = 'status error';
      }
    }

    // ── Live search ───────────────────────────────────────────────────────
    document.getElementById('search-input').addEventListener('input', e => {
      const q = e.target.value.trim().toLowerCase();
      const filtered = q ? allIds.filter(id => String(id).includes(q)) : allIds;
      renderCards(filtered);
    });

    loadRestaurants();
    loadCartBadge();
  </script>

</body>
</html>
