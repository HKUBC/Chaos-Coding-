<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Cart – Food Delivery App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f5f5f5;
      color: #333;
      min-height: 100vh;
    }

    header {
      background-color: #e63946;
      color: white;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 8px;
      transition: background 0.15s;
    }

    .back-btn:hover { background: rgba(255,255,255,0.35); }

    header h1 { font-size: 1.6rem; }

    .header-right { margin-left: auto; }

    .home-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      padding: 8px 14px;
      border-radius: 8px;
      transition: background 0.15s;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .home-btn:hover { background: rgba(255,255,255,0.35); }

    .container {
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .section-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: #222;
      margin-bottom: 4px;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #aaa;
    }

    .empty-state .empty-icon { font-size: 3.5rem; margin-bottom: 16px; }
    .empty-state p { font-size: 1rem; margin-bottom: 20px; }

    .btn-outline {
      display: inline-block;
      padding: 10px 24px;
      border: 2px solid #e63946;
      color: #e63946;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      background: none;
      transition: background 0.15s, color 0.15s;
    }

    .btn-outline:hover { background: #e63946; color: white; }

    /* Cart items */
    .cart-items { display: flex; flex-direction: column; gap: 12px; }

    .cart-item {
      background: white;
      border-radius: 12px;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      gap: 16px;
    }

    .cart-item-left { display: flex; align-items: center; gap: 14px; flex: 1; }
    .cart-item-icon { font-size: 1.8rem; }

    .cart-item-name { font-size: 1rem; font-weight: 600; }
    .cart-item-price { font-size: 0.85rem; color: #888; margin-top: 2px; }

    .qty-control {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .qty-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1.5px solid #e0e0e0;
      background: white;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      transition: border-color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .qty-btn:hover { border-color: #e63946; color: #e63946; background: #fff0f1; }

    .qty-value {
      font-size: 1rem;
      font-weight: 600;
      min-width: 20px;
      text-align: center;
    }

    .cart-item-subtotal {
      font-size: 1rem;
      font-weight: 700;
      color: #e63946;
      min-width: 64px;
      text-align: right;
    }

    .remove-btn {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: #ccc;
      padding: 4px;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .remove-btn:hover { color: #e63946; }

    /* Order summary */
    .summary-card {
      background: white;
      border-radius: 12px;
      padding: 24px 28px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    .summary-card .section-title { margin-bottom: 16px; }

    .summary-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.93rem;
      color: #555;
      margin-bottom: 10px;
    }

    .summary-row.total {
      font-size: 1.1rem;
      font-weight: 700;
      color: #222;
      border-top: 1px solid #eee;
      padding-top: 12px;
      margin-top: 4px;
    }

    /* Buttons */
    .btn-primary {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background-color: #e63946;
      color: white;
      margin-top: 18px;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-primary:hover { background-color: #c1121f; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { background-color: #f4a0a7; cursor: not-allowed; }

    .btn-clear {
      width: 100%;
      padding: 10px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      background: white;
      color: #888;
      margin-top: 10px;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-clear:hover { border-color: #e63946; color: #e63946; }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      display: none;
    }

    .alert.error { background: #fff0f1; border: 1px solid #f4a0a7; color: #c1121f; }
    .alert.success { background: #f0fff4; border: 1px solid #9ae6b4; color: #276749; }

    .spinner {
      width: 36px; height: 36px;
      border: 4px solid #eee;
      border-top-color: #e63946;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 60px auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header>
    <button class="back-btn" onclick="history.back()">&#8592;</button>
    <span>🛒</span>
    <h1>Your Cart</h1>
    <div class="header-right">
      <a class="home-btn" href="/frontend/index.html">🏠 Home</a>
    </div>
  </header>

  <div class="container">

    <div class="alert" id="alert"></div>

    <div id="loading"><div class="spinner"></div></div>

    <div id="empty-state" class="empty-state" style="display:none;">
      <div class="empty-icon">🛒</div>
      <p>Your cart is empty.</p>
      <a class="btn-outline" href="/frontend/index.html">Browse Restaurants</a>
    </div>

    <div id="cart-content" style="display:none;">
      <div>
        <p class="section-title">Cart Items</p>
      </div>
      <div class="cart-items" id="cart-items"></div>

      <div class="summary-card">
        <p class="section-title">Order Summary</p>
        <div class="summary-row"><span>Subtotal</span><span id="subtotal">$0.00</span></div>
        <div class="summary-row"><span>Delivery Fee</span><span>$2.50</span></div>
        <div class="summary-row"><span>Taxes (PST 7% + GST 5%)</span><span id="taxes">$0.00</span></div>
        <div class="summary-row total"><span>Total</span><span id="total">$0.00</span></div>

        <button class="btn-primary" id="checkout-btn" onclick="goToCheckout()">Proceed to Checkout →</button>
        <button class="btn-clear" onclick="clearCart()">Clear Cart</button>
      </div>
    </div>

  </div>

  <script>
    const API_BASE = 'http://localhost:8000';
    const customerId = localStorage.getItem('user_id');

    if (!customerId) window.location.href = '/frontend/login.html';

    const DELIVERY_FEE = 2.50;
    const TAX_RATE = 0.12;

    const foodIcons = ['🍕','🍔','🌮','🍜','🍱','🥗','🍣','🥘','🌯','🍛'];
    function iconFor(name) {
      const n = (name || '').toLowerCase();
      if (n.includes('pizza'))  return '🍕';
      if (n.includes('burger')) return '🍔';
      if (n.includes('taco') || n.includes('burrito')) return '🌮';
      if (n.includes('sushi'))  return '🍣';
      if (n.includes('pasta') || n.includes('noodle')) return '🍜';
      if (n.includes('salad'))  return '🥗';
      if (n.includes('rice'))   return '🍚';
      if (n.includes('cake') || n.includes('dessert')) return '🍰';
      if (n.includes('soup'))   return '🍲';
      return foodIcons[Math.abs(name.charCodeAt(0)) % foodIcons.length];
    }

    function showAlert(msg, type) {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = `alert ${type}`;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    }

    function updateSummary(subtotal) {
      const taxes = subtotal * TAX_RATE;
      const total = subtotal + taxes + DELIVERY_FEE;
      document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
      document.getElementById('taxes').textContent    = `$${taxes.toFixed(2)}`;
      document.getElementById('total').textContent    = `$${total.toFixed(2)}`;
    }

    function renderCart(cart) {
      document.getElementById('loading').style.display = 'none';

      if (!cart.items || cart.items.length === 0) {
        document.getElementById('empty-state').style.display = 'block';
        document.getElementById('cart-content').style.display = 'none';
        return;
      }

      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('cart-content').style.display = 'block';

      const listEl = document.getElementById('cart-items');
      listEl.innerHTML = '';

      cart.items.forEach(item => {
        const row = document.createElement('div');
        row.className = 'cart-item';
        row.dataset.itemId = item.item_id;
        row.innerHTML = `
          <div class="cart-item-left">
            <span class="cart-item-icon">${iconFor(item.name)}</span>
            <div>
              <div class="cart-item-name">${item.name}</div>
              <div class="cart-item-price">$${parseFloat(item.price).toFixed(2)} each</div>
            </div>
          </div>
          <div class="qty-control">
            <button class="qty-btn" onclick="changeQty('${item.item_id}', ${item.quantity - 1})">−</button>
            <span class="qty-value" id="qty-${item.item_id}">${item.quantity}</span>
            <button class="qty-btn" onclick="changeQty('${item.item_id}', ${item.quantity + 1})">+</button>
          </div>
          <div class="cart-item-subtotal" id="sub-${item.item_id}">$${parseFloat(item.subtotal).toFixed(2)}</div>
          <button class="remove-btn" onclick="removeItem('${item.item_id}')" title="Remove">✕</button>
        `;
        listEl.appendChild(row);
      });

      updateSummary(cart.total);
    }

    async function loadCart() {
      try {
        const res = await fetch(`${API_BASE}/cart/${customerId}`);
        const cart = await res.json();
        renderCart(cart);
      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        showAlert('Failed to load cart.', 'error');
      }
    }

    async function changeQty(itemId, newQty) {
      if (newQty < 0) return;
      try {
        const res = await fetch(`${API_BASE}/cart/${customerId}/update/${itemId}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ quantity: newQty })
        });
        const data = await res.json();
        if (!res.ok) { showAlert(data.detail || 'Failed to update quantity.', 'error'); return; }
        renderCart(data.cart);
      } catch (err) {
        showAlert('Failed to update quantity.', 'error');
      }
    }

    async function removeItem(itemId) {
      try {
        const res = await fetch(`${API_BASE}/cart/${customerId}/remove/${itemId}`, { method: 'DELETE' });
        const data = await res.json();
        if (!res.ok) { showAlert(data.detail || 'Failed to remove item.', 'error'); return; }
        renderCart(data.cart);
      } catch (err) {
        showAlert('Failed to remove item.', 'error');
      }
    }

    async function clearCart() {
      if (!confirm('Clear your entire cart?')) return;
      try {
        await fetch(`${API_BASE}/cart/${customerId}/clear`, { method: 'DELETE' });
        renderCart({ items: [], total: 0 });
      } catch (err) {
        showAlert('Failed to clear cart.', 'error');
      }
    }

    function goToCheckout() {
      window.location.href = '/frontend/checkout.html';
    }

    loadCart();
  </script>

</body>
</html>
